services:
  backend:
    build: .
    container_name: voice-bot-backend
    restart: unless-stopped
    ports:
      - "8557:8557"
    env_file:
      - .env
    environment:
      TZ: Asia/Kolkata
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    # We use host 0.0.0.0 so it's reachable from the frontend container
    command: uvicorn main:app --host 0.0.0.0 --port 8557

  frontend:
    build:
      context: ./frontend
      args:
        VITE_VAPI_PUBLIC_KEY: d9a51ca0-99a4-4735-b1f1-6d92d3257dec
        VITE_API_BASE_URL: ""
    container_name: voice-bot-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    environment:
      TZ: Asia/Kolkata
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
